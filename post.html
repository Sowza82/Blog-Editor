<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Artigo | SowzaTech</title>

<meta name="description" content="Artigo publicado no blog da SowzaTech sobre desenvolvimento e tecnologia.">

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

</head>

<body>

<header class="header">

<nav>
<a href="index.html" class="btn btn-read" aria-label="Voltar para lista de posts">
← Voltar
</a>
</nav>

<div class="post-actions">

<button id="editar" class="btn btn-edit">
Editar
</button>

<button id="excluir" class="btn btn-delete">
Excluir
</button>

</div>

</header>


<main class="container">

<article class="post-container">

<header class="post-header">

<h1 id="titulo"></h1>

<div class="post-meta">

<span id="autor"></span>

<span class="post-date" id="data"></span>

<span class="post-category" id="categoria"></span>

</div>

</header>


<img
id="imagem"
alt="Imagem do artigo"
class="post-image"
/>


<section
id="conteudo"
class="post-content">
</section>

</article>

</main>


<footer class="footer">

<p>© 2026 SowzaTech • Blog de tecnologia</p>

</footer>

<script src="js/post.js"></script>

</body>
</html>
