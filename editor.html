<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Editor de Post | SowzaTech</title>

<meta name="description" content="Editor de artigos da SowzaTech com suporte a Markdown e preview em tempo real.">

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

</head>

<body>

<header class="header">

<h1 class="logo">Criar Artigo</h1>

<a href="index.html" class="btn btn-read">
← Voltar
</a>

</header>


<main class="container">

<div class="editor-layout">

<!-- EDITOR -->

<section class="editor">

<h2>Editor</h2>


<div class="form-group">

<label for="titulo">Título</label>

<input
id="titulo"
placeholder="Digite o título do artigo"
required
/>

</div>


<div class="form-group">

<label for="autor">Autor</label>

<input
id="autor"
placeholder="Nome do autor"
required
/>

</div>


<div class="form-group">

<label for="categoria">Categoria</label>

<select id="categoria"></select>


<div class="categoria-actions">

<input
type="text"
id="nova-categoria"
placeholder="Criar nova categoria"
/>

<button
id="add-categoria"
type="button"
class="btn-add-cat">

Adicionar

</button>

</div>

</div>


<div class="form-group">

<label for="img-url">Imagem (URL)</label>

<input
id="img-url"
placeholder="https://imagem.com/foto.jpg"
/>

</div>


<div class="form-group">

<label for="upload-img">Ou upload de imagem</label>

<input
type="file"
id="upload-img"
accept="image/*"
/>

</div>


<div class="form-group">

<label for="conteudo">Conteúdo (Markdown)</label>

<textarea
id="conteudo"
placeholder="Escreva seu artigo usando Markdown..."
required
></textarea>

</div>


<button
id="publicar"
class="btn-publish">

Publicar Artigo

</button>

</section>


<!-- PREVIEW -->

<section class="preview">

<h2>Preview</h2>

<article class="preview-post">

<h1 id="render-titulo">
Título do artigo
</h1>

<p id="render-autor">
Autor
</p>

<img
id="render-img"
alt="Imagem do artigo"
class="preview-image"
/>

<div
id="render-conteudo"
class="preview-content">
</div>

</article>

</section>

</div>

</main>


<footer class="footer">

<p>© 2026 SowzaTech • Editor de artigos</p>

</footer>

<script src="js/editor.js"></script>

</body>
</html>
